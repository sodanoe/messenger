server {
    listen 80;
    server_name your-domain.example.com;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name your-domain.example.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example.com/privkey.pem;

    client_max_body_size 25M;

    # Логирование для отладки
    access_log /var/log/nginx/messenger_access.log;
    error_log /var/log/nginx/messenger_error.log debug;

    # POST /media/upload → FastAPI (должен быть ВЫШЕ location /media/)
    location /media/upload {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }


    # Media files - правильный путь
    location /media/ {
        alias /home/your_vps_user/messenger/media/;

        # Добавляем заголовки
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";

        # Проверяем существование файла
        try_files $uri =404;
    }

    # Всё остальное → uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;
    }
}
